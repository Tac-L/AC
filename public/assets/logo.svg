<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="100%" height="100%">
  <defs>
    <!-- Spade gold gradient (coords in the spade's own 64-unit space) -->
    <linearGradient id="spadeGold" x1="14" y1="10" x2="50" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FCEFAF" />
      <stop offset="0.45" stop-color="#E9B949" />
      <stop offset="1" stop-color="#B8860B" />
    </linearGradient>

    <!-- Gold gradient for the wordmark -->
    <linearGradient id="textGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCEFAF" />
      <stop offset="0.5" stop-color="#E9B949" />
      <stop offset="1" stop-color="#B8860B" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Brand Spade (64-unit path scaled into the lockup) -->
    <g transform="translate(1.2 -2.85) scale(0.9)">
      <path d="M32 12C27 22 12 29 12 40c0 6 4 10 10 10 3 0 6-1 8-4 0 5-2 9-7 11h18c-5-2-7-6-7-11 2 3 5 4 8 4 6 0 10-4 10-10 0-11-15-18-20-28Z" fill="url(#spadeGold)" />
    </g>

    <!-- AC娛樂 Brand Text -->
    <text x="62" y="38"
          font-family="'Cinzel', 'Playfair Display', 'Georgia', 'Times New Roman', serif"
          font-weight="900"
          font-size="24"
          fill="url(#textGold)"
          letter-spacing="2">AC娛樂</text>
  </g>
</svg>

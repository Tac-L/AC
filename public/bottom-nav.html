<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>底部导览 Bottom Nav</title>
<style>
  body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; background: #F1F5F9; }
  .demo { max-width: 420px; margin: 0 auto; min-height: 100vh; background: #fff; position: relative; }
  .demo-body { padding-bottom: 64px; }

  /* ===== 底部导览 ===== */
  .bottom-nav {
    --active: #3D6FE5;      /* 选中色（可改成品牌色） */
    --inactive: #9AA3B2;    /* 未选色 */
    position: fixed;
    left: 0; right: 0; bottom: 0;
    max-width: 420px; margin: 0 auto;
    display: flex;
    background: #fff;
    border-top: 1px solid #EEF0F3;
    padding: 6px 4px calc(8px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  .bottom-nav__tab {
    flex: 1; border: 0; background: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    color: var(--inactive);
    transition: color .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .bottom-nav__tab span { font-size: 12px; line-height: 1; }
  .bottom-nav__tab.is-active { color: var(--active); }
  .bottom-nav__tab svg { display: block; }
</style>
</head>
<body>
  <div class="demo">
    <div class="demo-body"></div>

    <nav class="bottom-nav">
      <button class="bottom-nav__tab" type="button" onclick="navSelect(this)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="6.5" y="3" width="11" height="18" rx="2.5"/><path d="M10.5 9.5 L14.5 12 L10.5 14.5 Z" fill="currentColor" stroke="none"/></svg>
        <span>短剧</span>
      </button>
      <button class="bottom-nav__tab" type="button" onclick="navSelect(this)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5.5" width="18" height="13" rx="3"/><path d="M10 9.5 L14.5 12 L10 14.5 Z" fill="currentColor" stroke="none"/></svg>
        <span>视频</span>
      </button>
      <button class="bottom-nav__tab" type="button" onclick="navSelect(this)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="10.5" rx="3"/><path d="M6.5 11 a5.5 5.5 0 0 0 11 0"/><path d="M12 16.5 V20"/><path d="M9 20 H15"/></svg>
        <span>直播</span>
      </button>
      <button class="bottom-nav__tab" type="button" onclick="navSelect(this)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M3.6 12 H20.4"/><path d="M12 3.5 V20.5"/><path d="M6 6.2 C9 9 9 15 6 17.8"/><path d="M18 6.2 C15 9 15 15 18 17.8"/></svg>
        <span>体育</span>
      </button>
      <button class="bottom-nav__tab" type="button" onclick="navSelect(this)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="7.5" width="19" height="9.5" rx="4.75"/><path d="M7 11 V14"/><path d="M5.5 12.5 H8.5"/><circle cx="15.5" cy="11.5" r="1.05" fill="currentColor" stroke="none"/><circle cx="17.8" cy="13.6" r="1.05" fill="currentColor" stroke="none"/></svg>
        <span>游戏</span>
      </button>
      <button class="bottom-nav__tab is-active" type="button" onclick="navSelect(this)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.6"/><path d="M5.5 19.5 a6.5 6.5 0 0 1 13 0"/></svg>
        <span>我的</span>
      </button>
    </nav>
  </div>

  <script>
    function navSelect(el) {
      el.parentNode.querySelectorAll('.bottom-nav__tab').forEach(function (t) {
        t.classList.remove('is-active');
      });
      el.classList.add('is-active');
    }
  </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background with dark purple gradient for luxury feel -->
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1f1a3a" />
      <stop offset="100%" stop-color="#0a0518" />
    </radialGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe259" />
      <stop offset="100%" stop-color="#ffa751" />
    </linearGradient>
    <linearGradient id="panther-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c2a38" />
      <stop offset="100%" stop-color="#0d0a14" />
    </linearGradient>
  </defs>

  <!-- Background Circle with Gold Border -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-grad)" stroke="url(#gold-grad)" stroke-width="12" />

  <!-- Ear left -->
  <path d="M140,170 L60,80 L180,120 Z" fill="url(#panther-grad)" stroke="#0d0a14" stroke-width="4" stroke-linejoin="round" />
  <path d="M130,155 L75,90 L165,120 Z" fill="#6d28d9" opacity="0.8" />

  <!-- Ear right -->
  <path d="M372,170 L452,80 L332,120 Z" fill="url(#panther-grad)" stroke="#0d0a14" stroke-width="4" stroke-linejoin="round" />
  <path d="M382,155 L437,90 L347,120 Z" fill="#6d28d9" opacity="0.8" />

  <!-- Main Head Face Silhouette -->
  <path d="M140,170 L110,260 L140,330 L256,410 L372,330 L402,260 L372,170 L340,190 L256,170 L172,190 Z" fill="url(#panther-grad)" stroke="#0d0a14" stroke-width="6" stroke-linejoin="round" />

  <!-- Forehead / Brow lines (geometric look) -->
  <path d="M172,190 L256,280 L340,190 Z" fill="#181424" opacity="0.6" />
  <path d="M220,180 L256,240 L292,180 Z" fill="#4c1d95" opacity="0.5" />

  <!-- Cheeks / Snout area -->
  <path d="M110,260 L190,320 L140,330 Z" fill="#0a0810" />
  <path d="M402,260 L322,320 L372,330 Z" fill="#0a0810" />

  <!-- Snout / Nose -->
  <path d="M256,280 L210,340 L256,385 L302,340 Z" fill="#030205" />
  <path d="M236,340 L276,340 L256,360 Z" fill="url(#gold-grad)" />

  <!-- Glowing Eyes -->
  <!-- Left Eye -->
  <path d="M175,245 Q210,230 225,260 Q195,265 175,245 Z" fill="url(#gold-grad)" />
  <circle cx="205" cy="248" r="3" fill="#ffffff" opacity="0.8" />
  
  <!-- Right Eye -->
  <path d="M337,245 Q302,230 287,260 Q317,265 337,245 Z" fill="url(#gold-grad)" />
  <circle cx="307" cy="248" r="3" fill="#ffffff" opacity="0.8" />

  <!-- Whisker/Cheek highlights -->
  <path d="M130,270 Q160,285 190,280" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6" />
  <path d="M382,270 Q352,285 322,280" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6" />

  <path d="M125,295 Q155,305 185,298" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6" />
  <path d="M387,295 Q357,305 327,298" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6" />
</svg>
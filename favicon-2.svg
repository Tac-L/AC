<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient (Luxurious Deep Purple-Black) -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d1f47" />
      <stop offset="70%" stop-color="#0e081c" />
      <stop offset="100%" stop-color="#050308" />
    </radialGradient>

    <!-- Gold Gradients for Borders and Accents -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe259" />
      <stop offset="35%" stop-color="#ffa751" />
      <stop offset="70%" stop-color="#ffdf7a" />
      <stop offset="100%" stop-color="#b37d14" />
    </linearGradient>

    <linearGradient id="gold-border-grad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b37d14" />
      <stop offset="30%" stop-color="#ffe259" />
      <stop offset="70%" stop-color="#ffa751" />
      <stop offset="100%" stop-color="#ffe259" />
    </linearGradient>

    <!-- Subtle Drop Shadow Filter for Depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Spade Glow Filter -->
    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle with Gold Border -->
  <circle cx="256" cy="256" r="236" fill="url(#bg-grad)" stroke="url(#gold-border-grad)" stroke-width="12" filter="url(#shadow)" />

  <!-- Inner Subtle Gold Ring -->
  <circle cx="256" cy="256" r="218" fill="none" stroke="url(#gold-grad)" stroke-width="2" opacity="0.4" stroke-dasharray="8 4" />

  <!-- Main Spade Shape -->
  <g filter="url(#shadow)">
    <!-- Spade Body and Stem (Filled with premium Gold Gradient) -->
    <path d="M 256, 95 
             C 256, 95, 140, 195, 140, 275 
             C 140, 355, 205, 375, 256, 325 
             C 307, 375, 372, 355, 372, 275 
             C 372, 195, 256, 95, 256, 95 Z" 
          fill="url(#gold-grad)" />
    
    <path d="M 256, 325 
             C 256, 325, 225, 365, 195, 395 
             L 317, 395 
             C 287, 365, 256, 325, 256, 325 Z" 
          fill="url(#gold-grad)" />
  </g>

  <!-- Centered "1" inside the Spade -->
  <text x="256" y="262" 
        font-family="'Cinzel', 'Playfair Display', 'Georgia', 'Times New Roman', serif" 
        font-weight="900" 
        font-size="110" 
        fill="#0e081c" 
        text-anchor="middle"
        letter-spacing="0">1</text>
</svg>

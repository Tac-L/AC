<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="100%" height="100%">
  <defs>
    <!-- Gold Gradient for Spade and Text -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe259" />
      <stop offset="50%" stop-color="#ffa751" />
      <stop offset="100%" stop-color="#b37d14" />
    </linearGradient>
    
    <!-- Subtle drop shadow to make logo pop -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Group with Shadow Filter -->
  <g filter="url(#shadow)">
    <!-- Spade Shape -->
    <!-- Spade Body -->
    <path d="M 30,12 
             C 30,12, 12,24, 12,32 
             C 12,40, 22,42, 30,37 
             C 38,42, 48,40, 48,32 
             C 48,24, 30,12, 30,12 Z" 
          fill="url(#gold-grad)" />
    <!-- Spade Stem -->
    <path d="M 30,37 
             C 30,37, 27,41, 22,44 
             L 38,44 
             C 33,41, 30,37, 30,37 Z" 
          fill="url(#gold-grad)" />
    
    <!-- Number 1 inside the Spade -->
    <text x="30" y="34" 
          font-family="'Cinzel', 'Playfair Display', 'Georgia', 'Times New Roman', serif" 
          font-weight="900" 
          font-size="12" 
          fill="#0e081c" 
          text-anchor="middle">1</text>

    <!-- AC娛樂 Brand Text -->
    <text x="62" y="38" 
          font-family="'Cinzel', 'Playfair Display', 'Georgia', 'Times New Roman', serif" 
          font-weight="900" 
          font-size="24" 
          fill="url(#gold-grad)" 
          letter-spacing="2">AC娛樂</text>
  </g>
</svg>

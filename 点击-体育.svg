<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%">
  <!-- Filled Blue Soccer Ball Icon for Active state -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer Circle Filled with Blue -->
    <circle cx="12" cy="12" r="9.5" fill="#3b82f6" />
    
    <!-- White lines for soccer pattern -->
    <g stroke="#ffffff" stroke-width="1.8">
      <!-- Central Pentagon -->
      <polygon points="12,9 14.8,11.1 13.7,14.4 10.3,14.4 9.2,11.1" />
      
      <!-- Radial lines -->
      <line x1="12" y1="9" x2="12" y2="2.5" />
      <line x1="14.8" y1="11.1" x2="19" y2="9.5" />
      <line x1="13.7" y1="14.4" x2="16.5" y2="20" />
      <line x1="10.3" y1="14.4" x2="7.5" y2="20" />
      <line x1="9.2" y1="11.1" x2="5" y2="9.5" />
    </g>
  </g>
</svg>
